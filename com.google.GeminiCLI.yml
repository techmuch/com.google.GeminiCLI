app-id: com.google.GeminiCLI
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: gemini
finish-args:
  - --share=network
modules:
  - name: gemini-cli
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin
      env:
        npm_config_nodedir: /usr/lib/sdk/node20
    build-commands:
      - npm install -g --offline --prefix=/app @google/gemini-cli
      - install -Dm644 com.google.GeminiCLI.metainfo.xml -t /app/share/metainfo/
    sources:
      - generated-sources.json
      - type: file
        path: com.google.GeminiCLI.metainfo.xml
